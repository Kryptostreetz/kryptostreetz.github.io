<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; padding:20px;">

<form action="https://formsubmit.co/kryptostreetzsol@gmail.com" method="POST">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" placeholder="Your Message" required></textarea>

    <!-- REQUIRED HIDDEN FIELDS -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <!-- OPTIONAL: Redirect after submit -->
    <input type="hidden" name="_next" value="https://kryptostreetz.github.io/thankyou.html">

    <button type="submit">Send Message</button>
</form>

<script>
console.log("FORM SCRIPT LOADED");

document.getElementById("contact-form").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData();
  formData.append("email", document.getElementById("email").value);
  formData.append("message", document.getElementById("message").value);

  fetch("https://script.google.com/macros/s/AKfycby1yPua73KaQXqOojBzuqDPvkBw113knRNjZtYWmCN87aXGYnodT2uTqmzXUF5PHf1Y/exec", {
    method: "POST",
    mode: "no-cors",
    body: formData
  });

  document.getElementById("form-status").style.display = "block";
  e.target.reset();
});
</script>

</body>
</html>
