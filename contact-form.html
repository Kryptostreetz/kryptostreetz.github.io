<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: "Inter", "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Center container */
    .form-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Card */
    .contact-form {
      width: 100%;
      max-width: 480px;
      padding: 32px;
      background: #0b0b0c;
      border-radius: 14px;
      border: 1px solid #0affff33;
      box-shadow:
        0 0 25px #00eaff22,
        inset 0 0 12px #00eaff11;
    }

    /* Labels */
    .contact-form label {
      margin-top: 18px;
      margin-bottom: 6px;
      display: block;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: #b8faff;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Inputs */
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 14px;
      background: #0f0f11;
      border: 1px solid #1b1b1d;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 15px;
      outline: none;
      transition: 0.25s ease;
    }

    /* Focus glow */
    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #00eaff;
      box-shadow: 0 0 12px #00eaff88;
    }

    /* Bigger message box */
    textarea[name="message"] {
      height: 220px;
      resize: vertical; /* keeps bottom-right resize handle */
    }

    /* Button */
    .contact-form button {
      margin-top: 26px;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #00eaff, #00bcd4);
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      letter-spacing: 0.5px;
      transition: 0.25s ease;
      box-shadow: 0 0 14px #00eaff55;
    }

    .contact-form button:hover {
      background: linear-gradient(135deg, #00c2dd, #009fb8);
      box-shadow: 0 0 22px #00eaffaa;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

<div class="form-wrapper">
  <form action="https://api.web3forms.com/submit" method="POST" id="contact-form" class="contact-form">
    <input type="hidden" name="access_key" value="670930a5-1b93-4fae-94d2-560050eb4500">
    <input type="hidden" name="redirect" value="https://kryptostreetz.github.io/thankyou.html">

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Message</label>
    <textarea name="message" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>

<script>
document.getElementById("contact-form").addEventListener("submit", function() {
    setTimeout(() => this.reset(), 50);
});
</script>

</body>
</html>
