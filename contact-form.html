<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; padding:20px;">

<form id="contact-form">
  <label>Email</label>
  <input type="email" id="email" name="email" required style="width:100%; margin-bottom:10px;">

  <label>Message</label>
  <textarea id="message" name="message" required style="width:100%; height:100px; margin-bottom:10px;"></textarea>

  <button type="submit">Send</button>

  <p id="form-status" style="color:#0f0; display:none;">Message sent.</p>
</form>

<script>
console.log("FORM SCRIPT LOADED");

document.getElementById("contact-form").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData();
  formData.append("email", document.getElementById("email").value);
  formData.append("message", document.getElementById("message").value);

  fetch("https://script.google.com/macros/s/AKfycby1yPua73KaQXqOojBzuqDPvkBw113knRNjZtYWmCN87aXGYnodT2uTqmzXUF5PHf1Y/exec", {
    method: "POST",
    mode: "no-cors",
    body: formData
  });

  document.getElementById("form-status").style.display = "block";
  e.target.reset();
});
</script>

</body>
</html>
