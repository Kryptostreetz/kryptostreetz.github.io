<script>
window.onload = function() {

  async function fetchPrices() {
    try {
        const cryptoRes = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
        const crypto = await cryptoRes.json();

        updatePrice("btc", crypto.bitcoin.usd);
        updatePrice("eth", crypto.ethereum.usd);
        updatePrice("sol", crypto.solana.usd);

    } catch (e) {
        console.log("Error fetching prices", e);
    }
}

    function updatePrice(id, newPrice) {
        const el = document.getElementById(id);
        const oldPrice = parseFloat(el.dataset.old || newPrice);

        el.innerText = "$" + newPrice.toLocaleString();

        if (newPrice > oldPrice) {
            el.classList.add("green");
            el.classList.remove("red");
        } else if (newPrice < oldPrice) {
            el.classList.add("red");
            el.classList.remove("green");
        }

        el.dataset.old = newPrice;
    }

    fetchPrices();
    setInterval(fetchPrices, 5000);
};
</script>
    <script>
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://decrypt.co/feed")
  .then(res => res.json())
  .then(data => {
      // Auto-updating summary (first article description)
      const first = data.items[0];
      document.getElementById("news-summary").innerHTML =
          first.description.replace(/<[^>]+>/g, "").slice(0, 200) + "...";

      // Top 3 stories
      const topStories = document.getElementById("top-stories");
      data.items.slice(0, 3).forEach(item => {
          const div = document.createElement("div");
div.className = "news-card";
div.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a>`;
topStories.appendChild(div);
      });
  })
  .catch(err => {
      document.getElementById("news-summary").innerHTML = "Unable to load news right now.";
  });
</script>
